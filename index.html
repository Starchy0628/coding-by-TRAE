<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眼动交互网页</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>眼动交互系统</h1>
        
        <div class="attention-display">
            <span class="label">注意力数值:</span>
            <span id="attention-value">0</span>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="image-container-wrapper">
            <div id="image-container">
                <img id="target-image" src="https://neeko-copilot.bytedance.net/api/text2image?prompt=cute%20cat%20portrait%20looking%20at%20camera%20soft%20lighting%20studio%20photo&size=512x512" alt="猫咪图片" onload="this.classList.remove('loading')" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 400 400&quot;%3E%3Cdefs%3E%3ClinearGradient id=&quot;g&quot; x1=&quot;0%25&quot; y1=&quot;0%25&quot; x2=&quot;100%25&quot; y2=&quot;100%25&quot;%3E%3Cstop offset=&quot;0%25&quot; style=&quot;stop-color:%23667eea&quot;/%3E%3Cstop offset=&quot;100%25&quot; style=&quot;stop-color:%23764ba2&quot;/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill=&quot;url(%23g)&quot; width=&quot;400&quot; height=&quot;400&quot;/%3E%3Ccircle cx=&quot;200&quot; cy=&quot;200&quot; r=&quot;80&quot; fill=&quot;rgba(255,255,255,0.3)&quot;/%3E%3Cpath d=&quot;M200 160 Q220 200 200 240 Q180 200 200 160&quot; fill=&quot;none&quot; stroke=&quot;white&quot; stroke-width=&quot;8&quot; stroke-linecap=&quot;round&quot;/%3E%3Ccircle cx=&quot;175&quot; cy=&quot;190&quot; r=&quot;8&quot; fill=&quot;white&quot;/%3E%3Ccircle cx=&quot;225&quot; cy=&quot;190&quot; r=&quot;8&quot; fill=&quot;white&quot;/%3E%3C/svg%3E'; this.classList.add('fallback')">
                <div id="aoi-circle"></div>
                <div id="gaze-indicator"></div>
            </div>
            <div class="status-info">
                <span id="status-text">准备就绪</span>
                <span id="gaze-coords"></span>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn btn-primary">开始追踪</button>
            <button id="stop-btn" class="btn btn-secondary">停止追踪</button>
            <button id="calibrate-btn" class="btn btn-info">重新校准</button>
            <button id="export-btn" class="btn btn-success">导出数据</button>
            <button id="clear-btn" class="btn btn-danger">清除数据</button>
        </div>

        <div class="instructions">
            <h3>使用说明</h3>
            <ul>
                <li>点击"开始追踪"按钮启动眼动追踪</li>
                <li>首次使用需要允许摄像头权限</li>
                <li>系统会自动校准，移动鼠标并点击进行校准</li>
                <li>注视图片中心的红色圆圈区域会增加注意力数值</li>
                <li>视线离开圆圈区域会减少注意力数值</li>
            </ul>
        </div>
    </div>

    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
    <script src="app.js"></script>
</body>
</html>
